parameters:
  - name: acrName
    type: string
  - name: repository
    type: string
  - name: dockerfile
    type: string
  - name: buildContext
    type: string
  - name: serviceConnection
    type: string

steps:
  - checkout: self

  - task: AzureCLI@2
    displayName: "Build container image in ACR"
    inputs:
      azureSubscription: "${{ parameters.serviceConnection }}"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        echo "Checking if image already exists in ACR..."
        TAG_EXISTS=$(az acr repository show-tags \
          --name ${{ parameters.acrName }} \
          --repository ${{ parameters.repository }} \
          --query "contains(@, 'latest')" \
          -o tsv 2>/dev/null || echo false)

        if [ "${TAG_EXISTS}" = "true" ]; then
          echo "Image ${{ parameters.repository }}:latest already exists. Skipping build."
          exit 0
        fi

        echo "Building image in Azure Container Registry..."
        cd ${{ parameters.buildContext }}
        az acr build \
          --image ${{ parameters.repository }}:$(Build.BuildId) \
          --image ${{ parameters.repository }}:latest \
          --registry ${{ parameters.acrName }} \
          --file ${{ parameters.dockerfile }} \
          .
