name: 04-03-catalog-api-cicd-appcfg

# trigger:
#   branches:
#     include:
#       - master
#   paths:
#     include:
#       - apps/catalog-api/*

trigger: none
pr: none

variables:
  buildConfiguration: Release
  serviceConnection: wi-az400-dev
  appPath: src/services/catalog-service/api/
  appService: food-catalog-api-yaml
  appConfigEP: "https://foodconfig-dev.azconfig.io"
  configLabel: "dev"
  configKeys: "*"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    jobs:
      - job: Build
        displayName: Transform Config and Build
        steps:
          - task: AzureAppConfiguration@8
            displayName: Read App Config
            inputs:
              azureSubscription: $(serviceConnection)
              AppConfigurationEndpoint: $(appConfigEP)
              KeyFilter: $(configKeys)
              Label: $(configLabel)
          - task: FileTransform@2
            displayName: Transform appsettings.json with App Config variables
            inputs:
              folderPath: $(System.DefaultWorkingDirectory)/$(appPath)
              jsonTargetFiles: appsettings.json
          - task: UseDotNet@2
            displayName: Install .NET 10 SDK
            inputs:
              packageType: sdk
              version: 10.0.x
          - task: DotNetCoreCLI@2
            displayName: Restore project dependencies
            inputs:
              command: restore
              projects: $(appPath)/catalog-service.csproj
          - task: DotNetCoreCLI@2
            displayName: Build the project
            inputs:
              command: build
              arguments: --no-restore --configuration $(buildConfiguration)
              projects: $(appPath)/catalog-service.csproj
          - task: DotNetCoreCLI@2
            displayName: Publish the project
            inputs:
              command: publish
              projects: $(appPath)/catalog-service.csproj
              publishWebProjects: false
              arguments: --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)
              zipAfterPublish: true
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)
              ArtifactName: drop
              publishLocation: Container

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployAppService
        displayName: Deploy to Appservice
        pool:
          vmImage: ubuntu-latest
        environment: 04-03-catalog-api-cicd-appcfg-env
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  inputs:
                    buildType: current
                    downloadType: single
                    artifactName: drop
                    downloadPath: $(System.ArtifactsDirectory)
                - task: AzureRmWebAppDeployment@4
                  displayName: 'Azure App Service Deploy: $(appService)'
                  inputs:
                    ConnectionType: AzureRM
                    azureSubscription: $(serviceConnection)
                    appType: webApp
                    WebAppName: $(appService)
                    packageForLinux: '$(System.ArtifactsDirectory)/**/*.zip'
