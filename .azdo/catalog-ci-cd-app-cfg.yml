name: 04-03-catalog-api-cicd-appcfg

# trigger:
#   branches:
#     include:
#       - master
#   paths:
#     include:
#       - apps/catalog-api/*

trigger: none
pr: none

variables:
  buildConfiguration: Release
  serviceConnection: wi-az400-dev
  appPath: src/services/catalog-service/api/
  appService: food-catalog-api-yaml
  appConfigEP: "https://foodconfig-dev.azconfig.io"
  configLabel: "dev"
  configKeys: "*"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    jobs:
      - job: Build
        displayName: "Transform Config and Build"
        steps:
          - task: CmdLine@2
            displayName: Printing Env before
            inputs:
              script: |
                printenv
          - task: AzureAppConfiguration@8
            displayName: Read App Config
            inputs:
              azureSubscription: $(serviceConnection)
              AppConfigurationEndpoint: "$(appConfigEP)"
              KeyFilter: $(configKeys)
              Label: $(configLabel)
          - task: CmdLine@2
            displayName: Display environment variables from App Config
            inputs:
              script: |
                echo "App Config values loaded:"
                printenv | grep -i "TITLE\|PREMIUM" || echo "No title/premium vars found - will use file transform"
          - task: FileTransform@2
            displayName: Transform appsettings.json with App Config variables
            inputs:
              folderPath: $(System.DefaultWorkingDirectory)/$(appPath)
              jsonTargetFiles: appsettings.json
          - template: templates/t-net-build.yaml
            parameters:
              cfg: $(buildConfiguration)
              folder: $(appPath)

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployAppService
        displayName: Deploy to Appservice
        pool:
          vmImage: ubuntu-latest
        environment: 04-03-catalog-api-cicd-appcfg-env
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  inputs:
                    buildType: current
                    downloadType: single
                    artifactName: drop
                    downloadPath: $(System.ArtifactsDirectory)
                - task: AzureRmWebAppDeployment@4
                  displayName: 'Azure App Service Deploy: $(appService)'
                  inputs:
                    ConnectionType: AzureRM
                    azureSubscription: $(serviceConnection)
                    appType: webApp
                    WebAppName: $(appService)
                    packageForLinux: '$(System.ArtifactsDirectory)/**/*.zip'
