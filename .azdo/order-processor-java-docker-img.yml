name: "02-04-order-processor-java-docker-img"

# trigger:
#   branches:
#     include:
#       - master
#   paths:
#     include:
#       - src/jobs/blob-java/*

trigger: none
pr: none

variables:
  appPath: src/jobs/blob-java/
  imageName: "blob-java"
  acr: scACR

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: "Build"
    displayName: "Build Order Processor Image"
    jobs:
      - job: "Build"
        steps:
          - template: templates/t-build-docker-image.yaml
            parameters:
              acrServiceConnection: $(acr)
              repository: $(imageName)
              dockerfile: "$(appPath)dockerfile"
              buildContext: $(appPath)
