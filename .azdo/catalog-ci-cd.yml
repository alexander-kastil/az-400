name: "03-02-catalog-api-ci-cd"

# trigger:
#   branches:
#     include:
#       - master
#   paths:
#     include:
#       - src/services/catalog-service/api/*

trigger: none
pr: none

variables:
  dotnetSdkVersion: "10.0.x"
  buildConfiguration: Release
  releaseBranchName: master
  serviceConnection: wi-az400-dev
  appPath: src/services/catalog-service/api/
  appService: food-catalog-api-yaml
  adoEnvironment: "03-02-catalog-api-ci-cd-env"

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: "Build"
    displayName: "Build"
    jobs:
      - job: "Build"
        displayName: "Build job"
        steps:
          - template: ../templates/t-net-build.yaml
            parameters:
              cfg: $(buildConfiguration)
              folder: $(appPath)
              project: catalog-service

  - stage: "Deploy"
    displayName: "Deploy"
    dependsOn: [ Build ]

    jobs:
      - template: ../templates/t-net-deploy-appservice.yaml
        parameters:
          adoEnvironment: $(adoEnvironment)
          serviceConnection: $(serviceConnection)
          appService: $(appService)
