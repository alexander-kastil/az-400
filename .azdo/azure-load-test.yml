name: 03-03-azure-load-test

trigger: none
pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  acrName: "az400acrdev"
  image: "az400acrdev.azurecr.io/prime-service"
  app: "prime-service-dev"
  grp: "az400-dev"
  serviceConnection: "wi-az400-dev"
  acaenv: "az400acaenv"
  targetPort: 8080
  loadTestResource: "az400-load-test"
  testFile: "demos/03-release-strategy/03-testing/02-load-test/test-prime-service.jmx"

stages:
  - stage: Check
    displayName: "Check Resources"
    jobs:
      - job: CheckResources
        displayName: "Check if resources exist"
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: "Check image and container app"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                # Check if image exists
                IMAGE_EXISTS=$(az acr repository show-tags \
                  --name $(acrName) \
                  --repository prime-service \
                  --query "contains(@, 'latest')" \
                  -o tsv 2>/dev/null || echo false)

                # Check if container app exists
                APP_EXISTS=$(az containerapp show -n $(app) -g $(grp) &>/dev/null && echo true || echo false)

                echo "##vso[task.setvariable variable=skipBuild;isOutput=true]$([ "$IMAGE_EXISTS" = "true" ] && echo true || echo false)"
                echo "##vso[task.setvariable variable=skipDeploy;isOutput=true]$([ "$APP_EXISTS" = "true" ] && echo true || echo false)"

                echo "Image exists: $IMAGE_EXISTS"
                echo "Container app exists: $APP_EXISTS"
            name: checkStep

  - stage: Build
    displayName: "Build Container Image"
    dependsOn: Check
    condition: eq(stageDependencies.Check.CheckResources.outputs['checkStep.skipBuild'], 'false')
    jobs:
      - job: BuildImage
        displayName: "Build Image in ACR"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Build container image in ACR"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "Checking if image already exists in ACR..."
                TAG_EXISTS=$(az acr repository show-tags \
                  --name $(acrName) \
                  --repository prime-service \
                  --query "contains(@, 'latest')" \
                  -o tsv 2>/dev/null || echo false)

                if [ "${TAG_EXISTS}" = "true" ]; then
                  echo "Image prime-service:latest already exists. Skipping build."
                  exit 0
                fi

                echo "Building image in Azure Container Registry..."
                cd src/services/prime-service
                az acr build \
                  --image prime-service:$(Build.BuildId) \
                  --image prime-service:latest \
                  --registry $(acrName) \
                  --file dockerfile \
                  .

  - stage: Deploy
    displayName: "Deploy to Container Apps"
    dependsOn:
      - Check
      - Build
    condition: eq(stageDependencies.Check.CheckResources.outputs['checkStep.skipDeploy'], 'false')
    jobs:
      - job: DeployApp
        displayName: "Deploy Container App"
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: "Fetch ACR credentials"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                ACR_PASSWORD=$(az acr credential show --name $(acrName) --query "passwords[0].value" -o tsv)
                echo "##vso[task.setvariable variable=acrPassword;issecret=true]${ACR_PASSWORD}"

          - task: AzureCLI@2
            displayName: "Deploy to Azure Container Apps"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                if az containerapp show -n $(app) -g $(grp) &>/dev/null; then
                  echo "Container app $(app) already exists. Skipping deploy."
                  exit 0
                fi

                echo "Creating new container app..."
                az containerapp create \
                  -n $(app) \
                  -g $(grp) \
                  --image $(image):$(Build.BuildId) \
                  --environment $(acaenv) \
                  --target-port $(targetPort) \
                  --ingress external \
                  --registry-server $(acrName).azurecr.io \
                  --registry-username $(acrName) \
                  --registry-password $(acrPassword)

          - task: AzureCLI@2
            displayName: "Get Container App URL"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                APP_URL=$(az containerapp show -n $(app) -g $(grp) --query properties.configuration.ingress.fqdn -o tsv)
                echo "Container App URL: https://${APP_URL}"
                echo "##vso[task.setvariable variable=appUrl;isOutput=true]${APP_URL}"
            name: getUrl

          - task: AzureCLI@2
            displayName: "Test Container App Endpoint"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                APP_URL=$(az containerapp show -n $(app) -g $(grp) --query properties.configuration.ingress.fqdn -o tsv)
                echo "Testing endpoint: https://${APP_URL}/api/primes/100"
                RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/api/primes/100")
                if [ "$RESPONSE" == "200" ]; then
                  echo "✓ Endpoint is responding correctly"
                else
                  echo "✗ Endpoint returned HTTP $RESPONSE"
                  exit 1
                fi

  - stage: LoadTest
    displayName: "Execute Load Test"
    dependsOn:
      - Check
      - Deploy
    condition: succeeded('Check')
    variables:
      appUrl: $[ coalesce(stageDependencies.Deploy.DeployApp.outputs['getUrl.appUrl'], '') ]
    jobs:
      - job: RunLoadTest
        displayName: "Run Azure Load Test"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Retrieve Container App URL"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                # Get the app URL - either from Deploy stage output or fetch it fresh
                if [ -z "$(appUrl)" ]; then
                  echo "App URL not from Deploy stage, fetching from Container Apps..."
                  APP_URL=$(az containerapp show -n $(app) -g $(grp) --query properties.configuration.ingress.fqdn -o tsv)
                  echo "##vso[task.setvariable variable=appUrl]${APP_URL}"
                  echo "Retrieved app URL: ${APP_URL}"
                else
                  echo "Using app URL from Deploy stage: $(appUrl)"
                fi

          - task: AzureLoadTest@1
            displayName: "Execute Azure Load Test"
            inputs:
              azureSubscription: "$(serviceConnection)"
              loadTestConfigFile: "demos/03-release-strategy/03-testing/02-load-test/prime-service-loadtest.yaml"
              resourceGroup: "$(grp)"
              loadTestResource: "$(loadTestResource)"
              env: |
                [
                  {
                    "name": "webapp",
                    "value": "$(appUrl)"
                  }
                ]

          - publish: $(System.DefaultWorkingDirectory)/loadTest
            artifact: loadTestResults

  - stage: Cleanup
    displayName: "Optional Cleanup"
    dependsOn: LoadTest
    condition: false # Set to true to enable cleanup
    jobs:
      - job: CleanupResources
        displayName: "Cleanup Container App"
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: "Delete Container App"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "Deleting container app $(app)..."
                az containerapp delete -n $(app) -g $(grp) --yes
                echo "Cleanup completed"
